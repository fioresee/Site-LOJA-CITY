<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS EXTERNO -->
    <link rel="stylesheet" href="./src/css/style.css">
    <title>LOJA CITY</title>
</head>
<body>
    <header>
        <p class="logo">LOJA<span>CITY</span></p>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
        <div class="carrinho">
            <span id="carrinho-contador">Itens:0</span>
        </div>
    </header>
    <main id="container">
        <h2>Produtos em Destaque</h2>
        <section class="card">
            <div class="card-game">
                <img src="./src/assets/imagem.jpg" alt="Produto ">
                <article class="card-content">
                    <h3>Produto 1</h3>
                    <p class="preco">R$ 300,00</p>
                    <button class="btn-comprar">Comprar</button>
                </article>
            </div>
            <div class="card-game">
                <img src="./src/assets/imagem2.jpg" alt="Produto">
                <article class="card-content">
                    <h3>Produto 2</h3>
                    <p class="preco">R$ 150,00</p>
                    <button class="btn-comprar">Comprar</button>
                </article>
            </div>
            <div class="card-game">
                <img src="./src/assets/imagem3.jpg" alt="Produto">
                <article class="card-content">
                    <h3>Produto 3</h3>
                    <p class="preco">R$ 200,00</p>
                    <button class="btn-comprar">Comprar</button>
                </article>
            </div>
        </section>

    </main>
</body>
</html>
